version: '3.8'

services:
  finvault:
    build: .
    container_name: finvault
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
