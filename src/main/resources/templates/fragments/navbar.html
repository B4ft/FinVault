<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container-fluid px-4">
        <!-- Brand -->
        <a class="navbar-brand logo-text" href="/dashboard">
            <i class="bi bi-bank2 me-2"></i>Fin<span class="gold">Vault</span>
        </a>

        <button class="navbar-toggler border-secondary" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/search">
                        <i class="bi bi-search me-1"></i>Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/documents">
                        <i class="bi bi-folder2-open me-1"></i>Documents
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/chat">
                        <i class="bi bi-robot me-1"></i>AI Assistant
                    </a>
                </li>
                <!-- Admin link - visible to all, but "protected" by JWT role -->
                <li class="nav-item">
                    <a class="nav-link" href="/admin">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                        <span th:if="${role == 'ADMIN'}" class="badge bg-danger ms-1">ADMIN</span>
                    </a>
                </li>
            </ul>

            <!-- Right side -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <span class="text-muted small">
                        <i class="bi bi-person-circle me-1 text-gold"></i>
                        <span th:text="${username}">user</span>
                    </span>
                </li>
                <li class="nav-item me-3">
                    <a th:href="@{/profile/{id}(id=${userId})}" class="nav-link py-0">
                        <i class="bi bi-person-gear me-1"></i>Profile
                        <span class="badge bg-secondary ms-1" th:text="'#' + ${userId}"></span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/auth/logout" class="btn btn-sm btn-outline-gold">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
