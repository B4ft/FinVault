<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinVault — Open an Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card" style="max-width:480px;">
        <div class="auth-logo text-center mb-4">
            <div class="logo-icon mb-3"><i class="bi bi-bank2"></i></div>
            <h1 class="logo-text">Fin<span class="gold">Vault</span></h1>
            <p class="text-muted small">Open Your Private Banking Account</p>
        </div>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/register}" method="post">
            <div class="mb-3">
                <label class="form-label text-light">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person-badge text-gold"></i></span>
                    <input type="text" class="form-control bg-dark text-light border-secondary"
                           name="fullName" placeholder="John Smith">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Username <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person text-gold"></i></span>
                    <input type="text" class="form-control bg-dark text-light border-secondary"
                           name="username" placeholder="Choose a username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Email Address <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-envelope text-gold"></i></span>
                    <input type="email" class="form-control bg-dark text-light border-secondary"
                           name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-light">Password <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-lock text-gold"></i></span>
                    <input type="password" class="form-control bg-dark text-light border-secondary"
                           name="password" placeholder="Choose a password" required>
                </div>
                <div class="form-text text-muted">Stored as plaintext (intentionally insecure demo).</div>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-2">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="border-secondary my-4">
        <p class="text-center text-muted small">
            Already have an account? <a href="/auth/login" class="text-gold text-decoration-none">Sign in</a>
        </p>
    </div>
    <p class="text-center text-muted small mt-4">&copy; 2024 FinVault Financial Group</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
